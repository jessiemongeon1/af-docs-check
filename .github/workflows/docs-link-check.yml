# .github/workflows/docs-link-check.yml
name: Daily Docs Link Check

on:
  schedule:
    - cron: '0 8 * * *'  # 8am UTC daily
  workflow_dispatch: # manual trigger

permissions:
  contents: write  # needed to commit results back

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run link checks and compare
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: bash ./scripts/check-docs.sh

      - name: Commit updated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs-link-reports/
          git diff --cached --quiet || git commit -m "chore: update link check results $(date +%Y-%m-%d)"
          git push